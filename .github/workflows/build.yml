name: Build (shared)

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''
        description: 'Feature branch to build. Empty = push to main (semantic versioning path).'
    outputs:
      image_tag:
        description: 'Built image tag'
        value: ${{ jobs.build.outputs.image_tag }}
      branch:
        description: 'Source branch'
        value: ${{ jobs.build.outputs.branch }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.tag.outputs.RELEASE_TAG }}
      branch: ${{ steps.tag.outputs.BRANCH }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch != '' && inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-1

      - name: Calculate tag
        id: tag
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)

          if [ -z "${{ inputs.branch }}" ]; then
            # Push to main: calculate semantic version tag
            BRANCH="main"
            COMMIT_MSG=$(git log -1 --format="%s")

            LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"

            MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST_TAG | cut -d. -f2)
            PATCH=$(echo $LATEST_TAG | cut -d. -f3)

            if echo "$COMMIT_MSG" | grep -qE '^feat!:|BREAKING CHANGE'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMIT_MSG" | grep -qE '^feat:'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            RELEASE_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          else
            # Feature branch: use normalized branch name as tag
            BRANCH="${{ inputs.branch }}"
            RELEASE_TAG=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "SOURCE_SHA=$SOURCE_SHA" >> $GITHUB_OUTPUT

      - name: Trigger CodeBuild and wait
        run: |
          SERVICE="${{ github.event.repository.name }}"

          BUILD_ID=$(aws codebuild start-build \
            --project-name "poc-test-${SERVICE}-build" \
            --source-version "${{ steps.tag.outputs.SOURCE_SHA }}" \
            --environment-variables-override \
              name=BRANCH,value="${{ steps.tag.outputs.BRANCH }}",type=PLAINTEXT \
              name=RELEASE_TAG,value="${{ steps.tag.outputs.RELEASE_TAG }}",type=PLAINTEXT \
            --region eu-south-1 \
            --query "build.id" --output text)

          echo "CodeBuild started: $BUILD_ID"

          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query "builds[0].buildStatus" --output text)
            echo "Status: $STATUS"
            [ "$STATUS" = "SUCCEEDED" ] && break
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || \
               [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "STOPPED" ]; then
              echo "::error::CodeBuild failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Push git tag
        if: inputs.branch == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.RELEASE_TAG }}
          git push origin ${{ steps.tag.outputs.RELEASE_TAG }}
