name: Deploy to prod (shared)

on:
  workflow_call:

jobs:
  promote-image:
    name: Promote image to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      SERVICE: ${{ github.event.repository.name }}
      AWS_REGION: eu-south-1
    outputs:
      ecr_image: ${{ steps.promote.outputs.ecr_image }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Promote main → ${{ github.ref_name }} in ECR
        id: promote
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.ref_name }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "poc-${SERVICE}" \
            --image-ids imageTag=main \
            --query "images[0].imageManifest" \
            --output text)

          aws ecr put-image \
            --repository-name "poc-${SERVICE}" \
            --image-tag "$RELEASE_TAG" \
            --image-manifest "$MANIFEST"

          ECR_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/poc-${SERVICE}:${RELEASE_TAG}"
          echo "ecr_image=$ECR_IMAGE" >> $GITHUB_OUTPUT
          echo "Promoted main → $RELEASE_TAG"

  deploy:
    name: Deploy ${{ github.ref_name }} to prod
    needs: promote-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      SERVICE: ${{ github.event.repository.name }}
      ENV: prod
      AWS_REGION: eu-south-1

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Register task definition
        id: taskdef
        run: |
          set -euo pipefail

          ECR_IMAGE="${{ needs.promote-image.outputs.ecr_image }}"

          aws ecs describe-task-definition \
            --task-definition "poc-${ENV}-${SERVICE}" \
            --query "taskDefinition" \
            --output json | \
          jq --arg image "$ECR_IMAGE" --arg container "$SERVICE" \
            'del(.taskDefinitionArn, .revision, .status, .registeredAt, .registeredBy, .compatibilities, .requiresAttributes)
             | .containerDefinitions |= map(if .name == $container then .image = $image else . end)' \
            > /tmp/task-def.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered task definition: $NEW_ARN"

      - name: Update ECS service
        run: |
          set -euo pipefail

          CLUSTER="poc-${ENV}-${SERVICE}-cluster"
          ECS_SERVICE="poc-${ENV}-${SERVICE}"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --force-new-deployment \
            --output text > /dev/null

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$ECS_SERVICE"

          echo "Service stable."

      - name: Summary
        run: |
          RELEASE_TAG="${{ github.ref_name }}"
          echo "### Deployed $SERVICE to prod" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | \`$RELEASE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`$ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | Release Please |" >> $GITHUB_STEP_SUMMARY
