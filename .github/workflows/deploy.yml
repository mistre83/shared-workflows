name: Deploy (shared)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        description: 'Image tag to deploy. If empty, uses ECR tag main (latest main build).'
      branch:
        required: false
        type: string
        description: 'Source branch. If empty, defaults to main.'

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      SERVICE: ${{ github.event.repository.name }}
      ENV: ${{ inputs.environment }}
      AWS_REGION: eu-south-1

    steps:
      - name: Block prod deploys
        if: inputs.environment == 'prod'
        run: |
          echo "::error::Direct deploy to prod is not allowed. Merge the Release Please PR to trigger deploy-prod.yml."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Resolve image tag
        id: resolve
        run: |
          set -euo pipefail

          IMAGE_TAG="${{ inputs.image_tag }}"
          BRANCH="${{ inputs.branch }}"

          if [ -z "$IMAGE_TAG" ]; then
            # No explicit tag: promote the latest main image via the mutable 'main' ECR tag.
            IMAGE_TAG="main"
            BRANCH="main"
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Image: $IMAGE_TAG (branch: $BRANCH)"

      - name: Register new task definition
        id: taskdef
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/poc-${SERVICE}:${{ steps.resolve.outputs.image_tag }}"

          aws ecs describe-task-definition \
            --task-definition "poc-${ENV}-${SERVICE}" \
            --query "taskDefinition" \
            --output json | \
          jq --arg image "$ECR_IMAGE" --arg container "$SERVICE" \
            'del(.taskDefinitionArn, .revision, .status, .registeredAt, .registeredBy, .compatibilities, .requiresAttributes)
             | .containerDefinitions |= map(if .name == $container then .image = $image else . end)' \
            > /tmp/task-def.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "New task definition: $NEW_ARN"

      - name: Update ECS service and wait for stability
        run: |
          set -euo pipefail

          CLUSTER="poc-${ENV}-${SERVICE}-cluster"
          ECS_SERVICE="poc-${ENV}-${SERVICE}"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --force-new-deployment \
            --output text > /dev/null

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$ECS_SERVICE"

          echo "Service stable."

      - name: Summary
        run: |
          IMAGE_TAG="${{ steps.resolve.outputs.image_tag }}"
          BRANCH="${{ steps.resolve.outputs.branch }}"
          echo "### Deployed $SERVICE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`$BRANCH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`$ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
